<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Notice: Your Consent is Required!</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e0e0e0;
            color: #333;
            text-align: center;
            overflow: hidden;
        }

        #cookie-consent {
            padding: 40px;
            border-radius: 8px;
            background-color: #ffffff;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            border: 1px solid #dcdcdc;
        }

        #cookie-consent h1 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 1.8em;
        }

        #cookie-consent p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        #cookie-consent button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        #cookie-consent button:last-of-type {
            background-color: #95a5a6;
        }

        #credit-name {
            margin-top: 25px;
            font-size: 0.8em;
            color: #bdc3c7;
            font-style: italic;
        }

        #jumpscare-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #jumpscare-video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="cookie-consent">
        <h1>Important Notice: Your Consent is Required!</h1>
        <p>This website uses cookies to ensure you get the best experience. To proceed, please **confirm your cookie preferences** now.</p>
        <button id="accept-button" disabled>Accept & Proceed</button>
        <button id="decline-button" disabled>Decline & Exit</button>
        
        <div id="credit-name">System Developer: Azfar 1A3</div>
    </div>

    <div id="jumpscare-container">
        <video id="jumpscare-video" playsinline preload="auto">
            <!-- Nama video telah dikembalikan ke System_Files.txt.mp4 -->
            <source src="System_Files.txt.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        const acceptButton = document.getElementById('accept-button');
        const declineButton = document.getElementById('decline-button');
        const cookieConsent = document.getElementById('cookie-consent');
        const jumpscareContainer = document.getElementById('jumpscare-container');
        const jumpscareVideo = document.getElementById('jumpscare-video');

        let videoReady = false;

        jumpscareVideo.load();

        jumpscareVideo.addEventListener('canplaythrough', () => {
            videoReady = true;
            acceptButton.disabled = false;
            declineButton.disabled = false;
        });

        setTimeout(() => {
            if (!videoReady) {
                acceptButton.disabled = false;
                declineButton.disabled = false;
            }
        }, 4000);

        function triggerJumpscare() {
            cookieConsent.style.display = 'none';
            jumpscareContainer.style.display = 'flex';
            
            jumpscareVideo.play().catch(error => {
                jumpscareVideo.muted = false; 
                jumpscareVideo.play();
            });
        }

        acceptButton.addEventListener('click', triggerJumpscare);
        declineButton.addEventListener('click', triggerJumpscare);
    </script>

</body>
</html>
